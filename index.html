<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Burger House</title>

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  >

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {

      font-family: "Inter", sans-serif;

      background: #111827;

      color: white;

      min-height: 100vh;

    }

    header {

      padding: 30px;

      text-align: center;

      background: #1f2937;

      border-bottom: 1px solid #374151;

    }

    header h1 {

      font-size: 42px;

      font-weight: 800;

      margin-bottom: 10px;

    }

    header p {

      color: #9ca3af;

    }

    .container {

      width: 100%;

      max-width: 1300px;

      margin: auto;

      padding: 30px;

    }

    .top-bar {

      display: flex;

      justify-content: space-between;

      align-items: center;

      gap: 20px;

      margin-bottom: 30px;

      flex-wrap: wrap;

    }

    #tabsContainer {

      display: flex;

      gap: 10px;

      flex-wrap: wrap;

    }

    .tab {

      border: none;

      background: #374151;

      color: white;

      padding: 10px 18px;

      border-radius: 999px;

      cursor: pointer;

      font-weight: 600;

    }

    .tab.is-active {

      background: #f59e0b;

      color: black;

    }

    .cart-box {

      background: #1f2937;

      padding: 12px 18px;

      border-radius: 14px;

      font-weight: 700;

    }

    .category-manager {

      display: flex;

      gap: 10px;

      margin-bottom: 30px;

      flex-wrap: wrap;

    }

    .category-manager input {

      flex: 1;

      min-width: 200px;

    }

    input,
    textarea,
    select {

      width: 100%;

      padding: 14px;

      border-radius: 12px;

      border: 1px solid #374151;

      background: #1f2937;

      color: white;

      font-size: 15px;

    }

    button {

      border: none;

      cursor: pointer;

      font-weight: 700;

    }

    .primary-button {

      background: #f59e0b;

      color: black;

      padding: 14px 20px;

      border-radius: 12px;

    }

    .danger-button {

      background: #dc2626;

      color: white;

      padding: 12px 16px;

      border-radius: 10px;

    }

    .success-button {

      background: #16a34a;

      color: white;

      padding: 12px 16px;

      border-radius: 10px;

    }

    .layout {

      display: grid;

      grid-template-columns: 2fr 1fr;

      gap: 30px;

    }

    @media (max-width: 900px) {

      .layout {

        grid-template-columns: 1fr;

      }

    }

    #menuGrid {

      display: grid;

      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));

      gap: 20px;

    }

    .menu-card {

      background: #1f2937;

      border-radius: 22px;

      overflow: hidden;

      border: 1px solid #374151;

    }

    .menu-card img {

      width: 100%;

      height: 220px;

      object-fit: cover;

    }

    .menu-card-content {

      padding: 20px;

    }

    .menu-card h3 {

      font-size: 22px;

      margin-bottom: 10px;

    }

    .menu-card p {

      color: #9ca3af;

      line-height: 1.5;

      margin-bottom: 16px;

    }

    .card-footer {

      display: flex;

      justify-content: space-between;

      align-items: center;

      margin-bottom: 16px;

    }

    .price {

      font-size: 24px;

      font-weight: 800;

      color: #f59e0b;

    }

    .menu-card button {

      width: 100%;

      padding: 14px;

      border-radius: 12px;

      background: #f59e0b;

      color: black;

      font-size: 15px;

    }

    .sidebar {

      display: flex;

      flex-direction: column;

      gap: 24px;

    }

    .panel {

      background: #1f2937;

      border-radius: 22px;

      padding: 24px;

      border: 1px solid #374151;

    }

    .panel h2 {

      margin-bottom: 20px;

      font-size: 24px;

    }

    .form-grid {

      display: grid;

      gap: 14px;

    }

    .cart-row {

      display: flex;

      justify-content: space-between;

      align-items: center;

      padding: 14px 0;

      border-bottom: 1px solid #374151;

    }

    .cart-total {

      margin-top: 20px;

      font-size: 24px;

      font-weight: 800;

    }

    .order-card {

      background: #111827;

      border-radius: 16px;

      padding: 20px;

      margin-bottom: 20px;

      border: 1px solid #374151;

    }

    .order-card-header {

      display: flex;

      justify-content: space-between;

      align-items: center;

      margin-bottom: 16px;

      gap: 20px;

    }

    .order-status {

      display: inline-flex;

      align-items: center;

      justify-content: center;

      padding: 6px 12px;

      border-radius: 999px;

      font-size: 12px;

      font-weight: 700;

      margin-top: 8px;

    }

    .status-pendiente .order-status {

      background: #fff3cd;

      color: #856404;

    }

    .status-completado .order-status {

      background: #d1fae5;

      color: #065f46;

    }

    .status-cancelado .order-status {

      background: #fee2e2;

      color: #991b1b;

    }

    .order-actions {

      display: flex;

      gap: 10px;

      margin-top: 18px;

    }

    .empty-state {

      text-align: center;

      color: #9ca3af;

      padding: 40px 0;

    }

  </style>

</head>

<body>

  <header>

    <h1>Burger House</h1>

    <p>
      Hamburguesas • Combos • Bebidas
    </p>

  </header>

  <main class="container">

    <div class="top-bar">

      <div id="tabsContainer"></div>

      <div class="cart-box">
        Carrito:
        <span id="cartCount">0</span>
      </div>

    </div>

    <div class="layout">

      <!-- MENU -->

      <section>

        <div
          id="itemCount"
          style="margin-bottom:20px;font-weight:700;"
        >
          0 productos
        </div>

        <div id="menuGrid"></div>

        <div
          id="emptyState"
          class="empty-state"
          hidden
        >
          No hay productos.
        </div>

      </section>

      <!-- SIDEBAR -->

      <aside class="sidebar">

        <!-- ADMIN -->

        <section class="panel">

          <h2>Panel Admin</h2>

          <div class="category-manager">

            <input
              type="text"
              id="newCategoryInput"
              placeholder="Nueva categoria"
            >

            <button
              id="addCategoryButton"
              class="primary-button"
              type="button"
            >
              Agregar
            </button>

          </div>

          <form
            id="adminForm"
            class="form-grid"
          >

            <input
              id="foodName"
              type="text"
              placeholder="Nombre"
              required
            >

            <input
              id="foodPrice"
              type="number"
              placeholder="Precio"
              required
            >

            <select
              id="foodCategory"
              required
            ></select>

            <textarea
              id="foodDescription"
              placeholder="Descripcion"
              rows="4"
              required
            ></textarea>

            <input
              id="foodImageUrl"
              type="text"
              placeholder="URL imagen"
              required
            >

            <button
              type="submit"
              class="primary-button"
            >
              Guardar Producto
            </button>

          </form>

        </section>

        <!-- CARRITO -->

        <section class="panel">

          <h2>Carrito</h2>

          <div id="cartItems"></div>

          <div
            id="cartEmpty"
            class="empty-state"
          >
            El carrito esta vacio
          </div>

          <div class="cart-total">

            Total:
            <span id="cartTotal">$0</span>

          </div>

        </section>

        <!-- PEDIDOS -->

        <section class="panel">

          <h2>Pedidos</h2>

          <div id="ordersList"></div>

          <div
            id="ordersEmpty"
            class="empty-state"
          >
            No hay pedidos
          </div>

        </section>

      </aside>

    </div>

  </main>

  <script
    type="module"
    src="app.js"
  ></script>

</body>
</html>
