<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Burger House</title>

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  >

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <!-- TU CSS -->
  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body>

  <!-- HEADER -->

  <header class="site-header">

    <div class="header-content">

      <div>

        <h1 class="logo-title">
          Burger House
        </h1>

        <p class="logo-subtitle">
          Hamburguesas • Combos • Bebidas
        </p>

      </div>

      <!-- BOTON ADMIN -->

      <button
        id="adminToggle"
        class="admin-toggle-button"
        type="button"
        aria-label="Abrir panel administrador"
      >
        ⚙️
      </button>

    </div>

  </header>

  <!-- LOGIN ADMIN -->

  <dialog id="adminLoginModal">

    <form
      id="adminLoginForm"
      class="admin-login-form"
    >

      <h2>
        Panel Administrador
      </h2>

      <input
        type="text"
        id="adminUsername"
        placeholder="Usuario"
        required
      >

      <input
        type="password"
        id="adminUserPassword"
        placeholder="Contraseña"
        required
      >

      <p
        id="adminLoginError"
        hidden
      >
        Usuario o contraseña incorrectos
      </p>

      <div class="admin-login-actions">

        <button
          type="submit"
          class="primary-button"
        >
          Entrar
        </button>

        <button
          type="button"
          id="closeAdminLogin"
          class="ghost-button"
        >
          Cancelar
        </button>

      </div>

    </form>

  </dialog>

  <!-- CONTENIDO -->

  <main class="container">

    <!-- TOP BAR -->

    <section class="top-bar">

      <!-- TABS -->

      <div id="tabsContainer"></div>

      <!-- CARRITO -->

      <div class="cart-box">

        Carrito:

        <span id="cartCount">
          0
        </span>

      </div>

    </section>

    <!-- LAYOUT -->

    <section class="layout">

      <!-- MENU -->

      <section class="menu-section">

        <div id="itemCount">
          0 productos
        </div>

        <div id="menuGrid"></div>

        <div
          id="emptyState"
          hidden
        >
          No hay productos disponibles
        </div>

      </section>

      <!-- SIDEBAR -->

      <aside
        class="sidebar"
        id="adminPanel"
        hidden
      >

        <!-- CATEGORIAS -->

        <section class="panel">

          <h2>
            Categorías
          </h2>

          <div class="category-manager">

            <input
              type="text"
              id="newCategoryInput"
              placeholder="Nueva categoria"
            >

            <button
              type="button"
              id="addCategoryButton"
              class="primary-button"
            >
              Agregar
            </button>

          </div>

        </section>

        <!-- ADMIN FORM -->

        <section class="panel">

          <h2>
            Agregar Producto
          </h2>

          <form id="adminForm">

            <input
              type="text"
              id="foodName"
              placeholder="Nombre"
              required
            >

            <input
              type="number"
              id="foodPrice"
              placeholder="Precio"
              required
            >

            <select
              id="foodCategory"
              required
            ></select>

            <textarea
              id="foodDescription"
              placeholder="Descripción"
              required
            ></textarea>

            <input
              type="text"
              id="foodImageUrl"
              placeholder="URL Imagen"
              required
            >

            <button
              type="submit"
              class="primary-button"
            >
              Guardar Producto
            </button>

          </form>

        </section>

        <!-- PEDIDOS -->

        <section class="panel">

          <h2>
            Pedidos
          </h2>

          <div id="ordersList"></div>

          <div
            id="ordersEmpty"
            hidden
          >
            No hay pedidos
          </div>

        </section>

      </aside>

    </section>

    <!-- CARRITO -->

    <section class="panel cart-panel">

      <h2>
        Carrito
      </h2>

      <div id="cartItems"></div>

      <div
        id="cartEmpty"
        hidden
      >
        El carrito está vacío
      </div>

      <div class="cart-total">

        Total:

        <span id="cartTotal">
          $0
        </span>

      </div>

    </section>

  </main>

  <!-- APP -->

  <script type="module" src="app.js"></script>

  <!-- LOGIN ADMIN -->

  <script>

    const ADMIN_USER = "admin";

    const ADMIN_PASSWORD = "admin123";

    const adminToggle =
      document.querySelector("#adminToggle");

    const adminLoginModal =
      document.querySelector("#adminLoginModal");

    const adminLoginForm =
      document.querySelector("#adminLoginForm");

    const adminUsername =
      document.querySelector("#adminUsername");

    const adminUserPassword =
      document.querySelector("#adminUserPassword");

    const adminLoginError =
      document.querySelector("#adminLoginError");

    const closeAdminLogin =
      document.querySelector("#closeAdminLogin");

    const adminPanel =
      document.querySelector("#adminPanel");

    adminToggle.addEventListener("click", () => {

      adminLoginModal.showModal();

    });

    closeAdminLogin.addEventListener("click", () => {

      adminLoginModal.close();

    });

    adminLoginForm.addEventListener("submit", (event) => {

      event.preventDefault();

      const validUser =
        adminUsername.value.trim() === ADMIN_USER;

      const validPassword =
        adminUserPassword.value === ADMIN_PASSWORD;

      if (!validUser || !validPassword) {

        adminLoginError.hidden = false;

        return;

      }

      adminLoginError.hidden = true;

      adminPanel.hidden = false;

      adminLoginModal.close();

      adminLoginForm.reset();

    });

  </script>

</body>
</html>
