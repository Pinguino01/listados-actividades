<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Listados de asistentes</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="Listados guardados">
        <div class="brand">
          <div>
            <p class="eyebrow">Registro</p>
            <h1>Asistentes</h1>
          </div>
          <button class="icon-button" id="newListButton" type="button" title="Nuevo listado" aria-label="Nuevo listado">
            +
          </button>
        </div>

        <label class="search-box">
          <span>Buscar listado</span>
          <input id="listSearch" type="search" placeholder="Nombre de actividad">
        </label>

        <div class="list-stack" id="listStack"></div>
      </aside>

      <section class="workspace" aria-live="polite">
        <header class="topbar">
          <div>
            <p class="eyebrow">Listado activo</p>
            <input class="title-input" id="listTitle" type="text" aria-label="Nombre del listado">
          </div>
          <div class="actions">
            <button class="secondary" id="duplicateListButton" type="button">Duplicar</button>
            <button class="danger" id="deleteListButton" type="button">Eliminar</button>
            <button class="primary" id="printButton" type="button">Imprimir</button>
          </div>
        </header>

        <section class="settings" aria-label="Configuracion del listado">
          <div>
            <p class="section-label">Campos del listado</p>
            <div class="field-options" id="fieldOptions"></div>
          </div>
          <div class="stats">
            <span id="syncStatus">Conectando Firebase</span>
            <span id="attendeeCount">0 asistentes</span>
            <span id="fieldCount">0 campos</span>
          </div>
        </section>

        <section class="entry-panel" aria-label="Agregar asistente">
          <div>
            <p class="section-label">Agregar asistente</p>
            <div class="form-grid" id="attendeeForm"></div>
          </div>
          <button class="primary add-button" id="addAttendeeButton" type="button">Agregar</button>
        </section>

        <section class="table-panel" aria-label="Tabla de asistentes">
          <div class="table-toolbar">
            <label class="table-search">
              <span>Buscar asistente</span>
              <input id="attendeeSearch" type="search" placeholder="Nombre, institucion, correo...">
            </label>
            <button class="secondary" id="clearSearchButton" type="button">Limpiar</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead id="attendeeHead"></thead>
              <tbody id="attendeeBody"></tbody>
            </table>
            <div class="empty-state" id="emptyState">
              <h2>Sin asistentes todavia</h2>
              <p>Agrega personas usando los campos activos del listado.</p>
            </div>
          </div>
        </section>
      </section>
    </main>

    <template id="listItemTemplate">
      <button class="list-item" type="button">
        <strong></strong>
        <span></span>
      </button>
    </template>

    <script type="module" src="script.js"></script>
  </body>
</html>
