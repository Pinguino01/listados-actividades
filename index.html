<!doctype html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Amigos Burguer</title>

  <link
    rel="stylesheet"
    href="styles.css"
  >

</head>

<body>

  <!-- ===================== -->
  <!-- HEADER -->
  <!-- ===================== -->

  <header class="topbar">

    <h1 class="logo">
      Amigos Burguer
    </h1>

    <div class="top-actions">

      <button
        id="cartEntry"
        class="icon-button"
      >
        🛒
        <span id="cartCount">0</span>
      </button>

      <button
        id="adminEntry"
        class="icon-button"
      >
        ⚙️
      </button>

    </div>

  </header>

  <!-- ===================== -->
  <!-- CATEGORIAS -->
  <!-- ===================== -->

  <section class="tabs-section">

    <div id="tabsContainer"></div>

  </section>

  <!-- ===================== -->
  <!-- MENU -->
  <!-- ===================== -->

  <main>

    <section class="menu-section">

      <div class="section-heading">

        <h2>
          Menú
        </h2>

        <span id="itemCount">
          0 productos
        </span>

      </div>

      <div
        id="menuGrid"
        class="menu-grid"
      ></div>

      <div
        id="emptyState"
        class="empty-state"
        hidden
      >

        No hay productos

      </div>

    </section>

  </main>

  <!-- ===================== -->
  <!-- MODAL ADMIN -->
  <!-- ===================== -->

  <dialog id="adminModal">

    <div class="modal-content">

      <div class="modal-header">

        <h2>
          Panel Admin
        </h2>

        <button id="closeAdmin">
          ✖
        </button>

      </div>

      <!-- LOGIN -->

      <form
        id="loginForm"
        class="login-form"
      >

        <input
          id="adminUser"
          type="text"
          placeholder="Usuario"
          required
        >

        <input
          id="adminPassword"
          type="password"
          placeholder="Contraseña"
          required
        >

        <p
          id="loginError"
          class="error"
          hidden
        >
          Credenciales incorrectas
        </p>

        <button type="submit">
          Iniciar sesión
        </button>

      </form>

      <!-- ADMIN CONTENT -->

      <div
        id="adminContent"
        hidden
      >

        <!-- CATEGORY MANAGER -->

        <div class="category-manager">

          <input
            id="newCategoryInput"
            type="text"
            placeholder="Nueva categoría"
          >

          <button
            id="addCategoryButton"
            type="button"
          >
            Agregar
          </button>

        </div>

        <!-- FORM PRODUCT -->

        <form id="adminForm">

          <input
            id="foodName"
            type="text"
            placeholder="Nombre"
            required
          >

          <input
            id="foodPrice"
            type="number"
            placeholder="Precio"
            required
          >

          <select id="foodCategory"></select>

          <input
            id="foodImageUrl"
            type="url"
            placeholder="URL Imagen"
            required
          >

          <textarea
            id="foodDescription"
            placeholder="Descripción"
            required
          ></textarea>

          <button type="submit">
            Guardar producto
          </button>

        </form>

        <hr>

        <!-- PEDIDOS -->

        <h3>
          Pedidos
        </h3>

        <div id="ordersList"></div>

        <div
          id="ordersEmpty"
          class="empty-state"
        >

          No hay pedidos

        </div>

        <button
          id="logoutAdmin"
          type="button"
          class="logout-button"
        >
          Cerrar sesión
        </button>

      </div>

    </div>

  </dialog>

  <!-- ===================== -->
  <!-- MODAL CARRITO -->
  <!-- ===================== -->

  <dialog id="cartModal">

    <div class="modal-content">

      <div class="modal-header">

        <h2>
          Carrito
        </h2>

        <button id="closeCart">
          ✖
        </button>

      </div>

      <div id="cartItems"></div>

      <div
        id="cartEmpty"
        class="empty-state"
      >

        Tu carrito está vacío

      </div>

      <div class="cart-footer">

        <strong id="cartTotal">
          $0
        </strong>

        <button id="confirmOrder">
          Confirmar pedido
        </button>

      </div>

    </div>

  </dialog>

  <!-- ===================== -->
  <!-- SCRIPT -->
  <!-- ===================== -->

  <script
    type="module"
    src="app.js"
  ></script>

</body>

</html>
